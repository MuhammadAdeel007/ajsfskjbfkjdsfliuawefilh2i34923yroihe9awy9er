
name: AI Website Builder

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    env:
      OPENAI_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
      OPENAI_API_BASE: https://integrate.api.nvidia.com/v1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Aider
        run: |
          pip install -r requirements.txt

      - name: Reinstall aider to restore broken file
        run: pip install --force-reinstall --no-deps aider-chat
      
      - name: Create project structure
        run: |
          mkdir -p site/assets/css
          mkdir -p site/assets/js
          mkdir -p site/templates
          mkdir -p site/docs

          touch site/index.html
          touch site/services.html
          touch site/blog.html
          touch site/faq.html
          touch site/about.html
          touch site/contact.html

          touch site/sitemap.xml
          touch site/robots.txt

          touch site/assets/css/style.css
          touch site/assets/js/main.js

          touch site/templates/article-template.html
          touch site/templates/state-template.html
          touch site/templates/county-template.html
          touch site/templates/city-template.html
          
          touch site/docs/architecture.md
          touch site/docs/seo.md
          touch site/docs/internal-linking.md
          touch site/docs/global-rules.md
          touch site/docs/project-state.md
          
      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "Initial commit to establish git history"
          
      - name: Patch aider prompts
        run: |
          python - <<'EOF'
          import ast
          import inspect
          import aider.coders.editblock_prompts as ep
          import aider.coders.wholefile_prompts as wp

          CUSTOM_SYSTEM = '''You are a senior front-end architect and SEO specialist. You write production-quality HTML, CSS, and documentation. When editing files, return the complete file content. Never truncate. Reply in English.'''
          def patch_file(path):
              with open(path, "r") as f:
                  content = f.read()
          
              lines = content.splitlines(keepends=True)
              tree = ast.parse(content)
          
              replacements = []
              for node in ast.walk(tree):
                  if isinstance(node, ast.ClassDef):
                      for item in node.body:
                          if isinstance(item, ast.Assign):
                              for target in item.targets:
                                  if isinstance(target, ast.Name):
                                      indent = len(lines[item.lineno - 1]) - len(lines[item.lineno - 1].lstrip())
                                      pad = " " * indent
          
                                      if target.id == "example_messages":
                                          replacements.append((
                                              item.lineno - 1,
                                              item.end_lineno,
                                              pad + 'example_messages = []\n'
                                          ))
          
                                      elif target.id == "main_system":
                                          replacements.append((
                                              item.lineno - 1,
                                              item.end_lineno,
                                              pad + f'main_system = """{CUSTOM_SYSTEM}"""\n'
                                          ))

              # Apply in reverse so line numbers stay valid
              for start, end, replacement in sorted(replacements, reverse=True):
                  lines[start:end] = [replacement]
          
              with open(path, "w") as f:
                  f.writelines(lines)
          
              print(f"Patched: {path}")
          
          patch_file(inspect.getfile(ep))
          patch_file(inspect.getfile(wp))
          print("Done.")

          EOF
          
      - name: Run AI Pipeline
        run: |
          python pipeline.py
          
      - name: Verify commits
        run: |
          echo "===== GIT LOG ====="
          git log --oneline -20
      
          echo ""
          echo "===== GIT STATUS ====="
          git status

      - name: Push all commits
        run: |
          git push origin HEAD:main
